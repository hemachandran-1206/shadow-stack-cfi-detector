<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow CFI Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  .topbar { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 14px 28px; display: flex; align-items: center; gap: 14px; }
  .topbar-logo { width: 32px; height: 32px; background: #3b4fd8; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .topbar h1 { font-size: 16px; font-weight: 600; }
  .badge-live { background: #16a34a22; color: #4ade80; border: 1px solid #4ade8033; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .topbar-sub { font-size: 11px; color: #64748b; margin-left: auto; }
  .reload-btn { background: #3b4fd822; border: 1px solid #3b4fd855; color: #818cf8; font-size: 12px; padding: 5px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .reload-btn:hover { background: #3b4fd833; }

  .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: #64748b; margin-bottom: 14px; }

  /* ── Summary cards ── */
  .cards-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 28px; }
  @media (max-width: 800px) { .cards-row { grid-template-columns: repeat(3, 1fr); } }
  .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 14px 16px; min-width: 0; }
  .card-label { font-size: 11px; color: #64748b; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-value { font-size: 20px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .val-red { color: #f87171; } .val-green { color: #4ade80; }
  .val-blue { color: #60a5fa; } .val-amber { color: #fbbf24; }
  .val-white { color: #e2e8f0; }

  /* status card gets special treatment */
  .card-status .card-value { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; padding: 4px 10px; border-radius: 99px; display: inline-block; }
  .status-vuln { background: #f8717122; color: #f87171; border: 1px solid #f8717144; }
  .status-clean { background: #4ade8022; color: #4ade80; border: 1px solid #4ade8044; }

  /* ── Charts ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  @media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }
  .panel { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 18px 20px; }
  .panel h3 { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 16px; }
  .chart-wrap { position: relative; width: 100%; height: 200px; }

  /* ── Status bar ── */
  .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 28px; background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 12px 16px; font-size: 13px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-red { background: #f87171; box-shadow: 0 0 6px #f87171; }
  .dot-green { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .status-bar .file { margin-left: auto; font-size: 11px; color: #64748b; font-family: monospace; }

  /* ── Violation cards ── */
  .violations-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
  .vcard { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; overflow: hidden; }
  .vcard-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; }
  .vcard-header:hover { background: #1e2235; }
  .vcard.expanded .vcard-header { border-bottom: 1px solid #2d3148; }
  .vcard-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .icon-critical { background: #f8717122; color: #f87171; }
  .icon-high { background: #fbbf2422; color: #fbbf24; }
  .vcard-meta { flex: 1; min-width: 0; }
  .vcard-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .vcard-addr { font-size: 11px; color: #64748b; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sev-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 99px; letter-spacing: 0.5px; white-space: nowrap; }
  .sev-CRITICAL { background: #f8717122; color: #f87171; border: 1px solid #f8717133; }
  .sev-HIGH { background: #fbbf2422; color: #fbbf24; border: 1px solid #fbbf2433; }
  .chevron { font-size: 16px; color: #64748b; transition: transform 0.2s; }
  .vcard.expanded .chevron { transform: rotate(180deg); }

  /* ── Violation detail ── */
  .vcard-detail { display: none; padding: 0; }
  .vcard.expanded .vcard-detail { display: block; }

  /* Address grid */
  .addr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 14px 16px; border-bottom: 1px solid #2d3148; }
  .addr-cell { background: #0f1117; border-radius: 8px; padding: 10px 12px; }
  .addr-key { font-size: 10px; color: #64748b; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 3px; }
  .addr-val { font-size: 12px; font-family: monospace; word-break: break-all; }
  .addr-val.red { color: #f87171; } .addr-val.green { color: #4ade80; } .addr-val.blue { color: #60a5fa; }

  /* ── Story section ── */
  .story { padding: 16px; }
  .story-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #64748b; margin-bottom: 14px; }

  .story-steps { display: flex; flex-direction: column; gap: 0; }
  .story-step { display: flex; gap: 14px; position: relative; }
  .story-step:not(:last-child) .step-line { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .story-step:last-child .step-line { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .step-line { width: 28px; }
  .step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; z-index: 1; }
  .step-dot.blue  { background: #1e40af44; color: #60a5fa; border: 1px solid #3b82f644; }
  .step-dot.red   { background: #7f1d1d44; color: #f87171; border: 1px solid #ef444444; }
  .step-dot.green { background: #14532d44; color: #4ade80; border: 1px solid #22c55e44; }
  .step-connector { width: 1px; background: #2d3148; flex: 1; margin: 2px 0; min-height: 16px; }
  .step-body { padding-bottom: 18px; flex: 1; min-width: 0; }
  .step-label { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; margin-top: 5px; }
  .step-label.blue  { color: #60a5fa; }
  .step-label.red   { color: #f87171; }
  .step-label.green { color: #4ade80; }
  .step-desc { font-size: 12px; color: #94a3b8; line-height: 1.65; }
  .step-code { font-family: monospace; font-size: 11px; background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; padding: 8px 10px; margin-top: 8px; color: #c084fc; line-height: 1.6; }
  .fix-pills { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .fix-pill { background: #14532d22; border: 1px solid #22c55e33; border-radius: 8px; padding: 7px 12px; font-size: 12px; color: #86efac; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; }
  .fix-pill i { flex-shrink: 0; margin-top: 1px; font-size: 14px; }

  .empty-state { text-align: center; padding: 48px 24px; color: #64748b; }
  .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo"><i class="ti ti-shield-lock" style="color:#fff;font-size:17px" aria-hidden="true"></i></div>
  <h1>Shadow CFI Dashboard</h1>
  <span class="badge-live">LIVE</span>
  <span class="topbar-sub" id="ts">—</span>
  <button class="reload-btn" onclick="loadReport()"><i class="ti ti-refresh" aria-hidden="true"></i> Reload</button>
</div>

<div class="main">

  <div class="status-bar" id="statusBar">
    <span class="status-dot dot-green" id="statusDot"></span>
    <span id="statusText">Loading…</span>
    <span class="file" id="statusFile">cfi_report.json</span>
  </div>

  <div class="section-label">Summary</div>
  <div class="cards-row">
    <div class="card card-status"><div class="card-label">Status</div><div id="c-status" class="card-value">—</div></div>
    <div class="card"><div class="card-label">Total violations</div><div class="card-value val-red" id="c-total">—</div></div>
    <div class="card"><div class="card-label">Shadow stack</div><div class="card-value val-amber" id="c-ss">—</div></div>
    <div class="card"><div class="card-label">CFI violations</div><div class="card-value val-red" id="c-cfi">—</div></div>
    <div class="card"><div class="card-label">Profile targets</div><div class="card-value val-blue" id="c-targets">—</div></div>
    <div class="card"><div class="card-label">Exit code</div><div class="card-value val-white" id="c-exit">—</div></div>
  </div>

  <div class="grid-2">
    <div class="panel">
      <h3>Violations by type</h3>
      <div class="chart-wrap"><canvas id="typeChart" role="img" aria-label="Doughnut chart of violation types">No data.</canvas></div>
    </div>
    <div class="panel">
      <h3>Severity breakdown</h3>
      <div class="chart-wrap"><canvas id="sevChart" role="img" aria-label="Bar chart of severity counts">No data.</canvas></div>
    </div>
  </div>

  <div class="section-label">Violations</div>
  <div class="violations-list" id="violationList">
    <div class="empty-state"><i class="ti ti-loader" aria-hidden="true"></i>Loading…</div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let typeChartInst = null, sevChartInst = null;

const TYPE_META = {
  shadow_stack:       { label: 'Shadow stack overwrite', icon: 'ti-stack-2',     color: '#f87171' },
  cfi_indirect:       { label: 'Indirect call hijack',   icon: 'ti-arrows-shuffle', color: '#fbbf24' },
  cfi_invalid_target: { label: 'Invalid call target',    icon: 'ti-map-pin-off', color: '#f472b6' },
};
function tm(t) { return TYPE_META[t] || { label: t, icon: 'ti-alert-triangle', color: '#94a3b8' }; }

/* What happened story per violation type */
function storyFor(v) {
  if (v.type === 'shadow_stack') {
    return [
      {
        color: 'blue', icon: 'ti-code',
        label: 'What the code did',
        desc: 'The program called a function that reads user input into a fixed-size stack buffer without checking the length.',
        code: `char buf[24];\ngets(buf);  // no bounds check!`
      },
      {
        color: 'red', icon: 'ti-skull',
        label: 'What the attacker achieved',
        desc: `By sending more bytes than the buffer can hold, the saved return address on the stack was overwritten. When the function returned, execution jumped to <code style="color:#f87171;font-family:monospace">${v.actual_return}</code> instead of the legitimate caller at <code style="color:#4ade80;font-family:monospace">${v.expected_return}</code>.`,
      },
      {
        color: 'green', icon: 'ti-shield-check',
        label: 'How to fix it',
        fixes: (v.fix_suggestion || '').split('. ').map(s => s.trim().replace(/\.$/, '')).filter(Boolean)
      }
    ];
  }
  if (v.type === 'cfi_indirect') {
    return [
      {
        color: 'blue', icon: 'ti-code',
        label: 'What the code did',
        desc: 'The program stored a function pointer (or vtable entry) and later called it indirectly. During normal execution this pointer pointed to the legitimate function.',
        code: `void (*fn)() = real_method;\nfn();  // indirect call`
      },
      {
        color: 'red', icon: 'ti-skull',
        label: 'What the attacker achieved',
        desc: `A memory corruption bug (use-after-free, buffer overflow, or type confusion) overwrote the pointer so the indirect call landed on <code style="color:#f87171;font-family:monospace">${v.symbol}</code> at <code style="color:#f87171;font-family:monospace">${v.target}</code> — a function the attacker chose, not the program.`,
      },
      {
        color: 'green', icon: 'ti-shield-check',
        label: 'How to fix it',
        fixes: (v.fix_suggestion || '').split('. ').map(s => s.trim().replace(/\.$/, '')).filter(Boolean)
      }
    ];
  }
  if (v.type === 'cfi_invalid_target') {
    const isHeap = parseInt(v.target, 16) > 0x10000000;
    return [
      {
        color: 'blue', icon: 'ti-code',
        label: 'What the code did',
        desc: isHeap
          ? 'The attacker filled heap memory with shellcode (NOP sled + payload) across many allocations, then redirected a function pointer into the heap region.'
          : 'An indirect call was redirected to the middle of an existing function, bypassing the function prologue and any security checks at the function entry.',
        code: isHeap
          ? `// Heap spray\nfor (int i = 0; i < 64; i++)\n  memcpy(malloc(256), shellcode, 256);\nfn = (void*) 0x${parseInt(v.target,16).toString(16)};`
          : `fn = (void*) ${v.target}; // mid-function addr`
      },
      {
        color: 'red', icon: 'ti-skull',
        label: 'What the attacker achieved',
        desc: `The indirect call target <code style="color:#f87171;font-family:monospace">${v.target}</code> is ${isHeap ? 'in heap memory — outside the code segment entirely' : 'not a valid function entry point'}. The CFI tool detected this because the address was never registered as a legitimate call target.`,
      },
      {
        color: 'green', icon: 'ti-shield-check',
        label: 'How to fix it',
        fixes: (v.fix_suggestion || '').split('. ').map(s => s.trim().replace(/\.$/, '')).filter(Boolean)
      }
    ];
  }
  return [];
}

function renderStory(v) {
  const steps = storyFor(v);
  if (!steps.length) return '';
  return `
  <div class="story">
    <div class="story-title">What happened</div>
    <div class="story-steps">
      ${steps.map((s, i) => `
        <div class="story-step">
          <div class="step-line">
            <div class="step-dot ${s.color}"><i class="ti ${s.icon}" aria-hidden="true"></i></div>
            ${i < steps.length - 1 ? '<div class="step-connector"></div>' : ''}
          </div>
          <div class="step-body">
            <div class="step-label ${s.color}">${s.label}</div>
            <div class="step-desc">${s.desc || ''}</div>
            ${s.code ? `<div class="step-code">${s.code}</div>` : ''}
            ${s.fixes ? `<div class="fix-pills">${s.fixes.map(f =>
              `<div class="fix-pill"><i class="ti ti-check" aria-hidden="true"></i>${f}.</div>`
            ).join('')}</div>` : ''}
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderCards(s) {
  const total = s.total_violations || 0;
  const statusEl = document.getElementById('c-status');
  statusEl.innerHTML = `<span class="${total > 0 ? 'status-vuln' : 'status-clean'}">${total > 0 ? 'VULNERABLE' : 'CLEAN'}</span>`;
  document.getElementById('c-total').textContent   = total;
  document.getElementById('c-ss').textContent      = s.shadow_stack_violations;
  document.getElementById('c-cfi').textContent     = s.cfi_violations;
  document.getElementById('c-targets').textContent = s.cfi_observed_targets;
  document.getElementById('c-exit').textContent    = s.exit_code;
  const dot = document.getElementById('statusDot');
  document.getElementById('statusText').textContent = total > 0
    ? `${total} violation${total > 1 ? 's' : ''} detected`
    : 'No violations — binary appears clean';
  dot.className = 'status-dot ' + (total > 0 ? 'dot-red' : 'dot-green');
}

function renderCharts(violations) {
  const typeCounts = {}, sevCounts = { CRITICAL: 0, HIGH: 0 };
  violations.forEach(v => {
    typeCounts[v.type] = (typeCounts[v.type] || 0) + 1;
    if (sevCounts[v.severity] !== undefined) sevCounts[v.severity]++;
  });
  if (typeChartInst) typeChartInst.destroy();
  if (sevChartInst)  sevChartInst.destroy();
  const typeKeys = Object.keys(typeCounts);
  typeChartInst = new Chart(document.getElementById('typeChart'), {
    type: 'doughnut',
    data: { labels: typeKeys.map(k => tm(k).label), datasets: [{ data: typeKeys.map(k => typeCounts[k]), backgroundColor: typeKeys.map(k => tm(k).color), borderWidth: 2, borderColor: '#1a1d27' }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 10, padding: 12 } } } }
  });
  sevChartInst = new Chart(document.getElementById('sevChart'), {
    type: 'bar',
    data: { labels: ['CRITICAL', 'HIGH'], datasets: [{ data: [sevCounts.CRITICAL, sevCounts.HIGH], backgroundColor: ['#f87171', '#fbbf24'], borderRadius: 6, borderSkipped: false }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#64748b', font: { size: 11 } }, grid: { color: '#2d3148' } }, y: { ticks: { color: '#64748b', stepSize: 1 }, grid: { color: '#2d3148' }, beginAtZero: true } } }
  });
}

function renderViolations(violations) {
  const list = document.getElementById('violationList');
  if (!violations || !violations.length) {
    list.innerHTML = `<div class="empty-state"><i class="ti ti-shield-check" aria-hidden="true"></i><div>No violations found</div></div>`;
    return;
  }
  list.innerHTML = violations.map(v => {
    const m = tm(v.type);
    const iconClass = v.severity === 'CRITICAL' ? 'icon-critical' : 'icon-high';
    let addrInfo = v.type === 'shadow_stack'
      ? `expected ${v.expected_return} → got ${v.actual_return}`
      : `callsite ${v.callsite} → target ${v.target}`;
    let addrGrid = v.type === 'shadow_stack' ? `
      <div class="addr-cell"><div class="addr-key">Expected return</div><div class="addr-val green">${v.expected_return}</div></div>
      <div class="addr-cell"><div class="addr-key">Actual return</div><div class="addr-val red">${v.actual_return}</div></div>
      <div class="addr-cell"><div class="addr-key">Thread</div><div class="addr-val">${v.thread_id}</div></div>
      <div class="addr-cell"><div class="addr-key">Symbol</div><div class="addr-val blue">${v.symbol}</div></div>` : `
      <div class="addr-cell"><div class="addr-key">Callsite</div><div class="addr-val">${v.callsite}</div></div>
      <div class="addr-cell"><div class="addr-key">Target (hijacked)</div><div class="addr-val red">${v.target}</div></div>
      <div class="addr-cell"><div class="addr-key">Thread</div><div class="addr-val">${v.thread_id}</div></div>
      <div class="addr-cell"><div class="addr-key">Symbol</div><div class="addr-val blue">${v.symbol}</div></div>`;
    return `
    <div class="vcard" id="vc-${v.id}">
      <div class="vcard-header" onclick="toggle('vc-${v.id}')">
        <div class="vcard-icon ${iconClass}"><i class="ti ${m.icon}" aria-hidden="true"></i></div>
        <div class="vcard-meta">
          <div class="vcard-title">#${v.id} — ${m.label}</div>
          <div class="vcard-addr">${addrInfo}</div>
        </div>
        <span class="sev-badge sev-${v.severity}">${v.severity}</span>
        <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
      </div>
      <div class="vcard-detail">
        <div class="addr-grid">${addrGrid}</div>
        ${renderStory(v)}
      </div>
    </div>`;
  }).join('');
}

function toggle(id) {
  document.getElementById(id).classList.toggle('expanded');
}

async function loadReport() {
  document.getElementById('ts').textContent = 'Last loaded: ' + new Date().toLocaleTimeString();
  try {
    const res = await fetch('cfi_report.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderCards(data.summary || {});
    renderCharts(data.violations || []);
    renderViolations(data.violations || []);
    document.getElementById('statusFile').textContent = 'cfi_report.json ✓';
  } catch (e) {
    document.getElementById('statusText').textContent = 'Failed to load — ' + e.message;
    document.getElementById('statusDot').className = 'status-dot dot-red';
    document.getElementById('violationList').innerHTML =
      `<div class="empty-state"><i class="ti ti-file-alert" aria-hidden="true"></i><div>Could not load cfi_report.json<br>Run the Pin tool first</div></div>`;
  }
}

loadReport();
</script>
</body>
</html>
